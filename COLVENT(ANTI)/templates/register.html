{% extends 'base.html' %}

{% block title %}Register for {{ competition.name }}{% endblock %}

{% block content %}
<div class="flex justify-center items-start pt-12 h-full">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 w-full max-w-lg">
        <h2 class="text-2xl font-bold text-center text-gray-900 mb-2">Register for Competition</h2>
        <div class="text-center mb-8">
            <h3 class="text-blue-600 font-semibold text-lg">{{ competition.name }}</h3>
            <p class="text-gray-500 text-sm mt-1">Event: {{ competition.events.name }}</p>
        </div>
        
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" name="name" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all" required>
            </div>
            
            <div class="grid grid-cols-3 gap-4">
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
                    <select name="department" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all" required>
                        <option value="CSE">Computer Science (CSE)</option>
                        <option value="ISE">Information Science (ISE)</option>
                        <option value="ECE">Electronics (ECE)</option>
                        <option value="ME">Mechanical (ME)</option>
                        <option value="CE">Civil (CE)</option>
                    </select>
                </div>
                <div class="col-span-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Year</label>
                    <select name="year" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all" required>
                        <option value="1">1st Year</option>
                        <option value="2">2nd Year</option>
                        <option value="3">3rd Year</option>
                        <option value="4">4th Year</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow-sm mt-2">
                Complete Registration
            </button>
            
            <div class="text-center mt-4">
                <a href="{{ url_for('student_dashboard') }}" class="text-sm font-medium text-gray-500 hover:text-gray-700 transition-colors">
                    Cancel and return to Dashboard
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
