<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - COLVENTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen text-gray-800">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8 w-full max-w-md">
        <div class="flex justify-center mb-6">
            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                <svg class="w-6 h-6 text-blue-600" fill="currentColor" viewBox="0 0 20 20"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"></path></svg>
            </div>
        </div>
        <h2 class="text-2xl font-bold text-center text-gray-900 mb-8">Welcome Back</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-6 space-y-2">
                    {% for category, message in messages %}
                        <div class="p-3 rounded-lg text-sm font-medium {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200{% else %}bg-green-50 text-green-700 border border-green-200{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="flex gap-4 mb-6">
                <button type="button" id="btn-student" class="flex-1 py-2.5 rounded-lg border-2 border-blue-600 bg-blue-50 text-blue-700 font-semibold transition-all focus:outline-none" onclick="setRole('student')">Student</button>
                <button type="button" id="btn-admin" class="flex-1 py-2.5 rounded-lg border-2 border-gray-200 bg-white text-gray-500 font-medium hover:border-gray-300 transition-all focus:outline-none" onclick="setRole('admin')">Admin</button>
            </div>
            
            <input type="hidden" name="role" id="role-input" value="student">
            
            <div id="usn-group" class="mb-4">
                <label for="usn" id="usn-label" class="block text-sm font-medium text-gray-700 mb-2">University Seat Number (USN)</label>
                <input type="text" name="usn" id="usn" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all placeholder-gray-400" placeholder="e.g. 1AY20CS001" required>
            </div>

            <div id="password-group" class="mb-6">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" name="password" id="password" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all placeholder-gray-400" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow-sm mb-4">
                Sign In
            </button>
            
            <div class="text-center" id="signup-link">
                <p class="text-sm text-gray-500">Don't have an account? <a href="{{ url_for('signup') }}" class="text-blue-600 font-medium hover:underline">Sign up</a></p>
            </div>
        </form>
    </div>

    <script>
        function setRole(role) {
            document.getElementById('role-input').value = role;
            
            const btnStudent = document.getElementById('btn-student');
            const btnAdmin = document.getElementById('btn-admin');
            const usnLabel = document.getElementById('usn-label');
            const usnInput = document.getElementById('usn');
            const signupLink = document.getElementById('signup-link');
            
            if (role === 'admin') {
                btnAdmin.className = 'flex-1 py-2.5 rounded-lg border-2 border-blue-600 bg-blue-50 text-blue-700 font-semibold transition-all focus:outline-none';
                btnStudent.className = 'flex-1 py-2.5 rounded-lg border-2 border-gray-200 bg-white text-gray-500 font-medium hover:border-gray-300 transition-all focus:outline-none';
                usnLabel.innerText = "Username";
                usnInput.placeholder = "admin";
                signupLink.style.display = 'none';
            } else {
                btnStudent.className = 'flex-1 py-2.5 rounded-lg border-2 border-blue-600 bg-blue-50 text-blue-700 font-semibold transition-all focus:outline-none';
                btnAdmin.className = 'flex-1 py-2.5 rounded-lg border-2 border-gray-200 bg-white text-gray-500 font-medium hover:border-gray-300 transition-all focus:outline-none';
                usnLabel.innerText = "University Seat Number (USN)";
                usnInput.placeholder = "e.g. 1AY20CS001";
                signupLink.style.display = 'block';
            }
        }
    </script>
</body>
</html>
